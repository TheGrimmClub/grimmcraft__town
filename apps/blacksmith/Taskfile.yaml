version: "3"

env:
  PYTHONPATH: packages/filesystem/src:apps/guard/src:apps/scout/src:apps/blacksmith/src:apps/town/src

tasks:
  init:   #TODO: implement `blacksmith init`
      desc: "Create a new datapack on base of a tempalte"
      cmds:
        - uv run blacksmith init {{.CLI_ARGS}}

  upgrade: #TODO: implement `blacksmith upgrade`
      desc: "Upgrade a datapack (mainly versions for now)"
      cmds:
        - uv run blacksmith upgrade {{.CLI_ARGS}}

  list:
    desc: "List datapacks in the world "
    cmds:
      - uv run blacksmith list {{.CLI_ARGS}}

  forge:
    desc: "Forge a datapack's functions (e.g. `task forge -- fireworks`)"
    cmds:
      - uv run blacksmith forge {{.CLI_ARGS}}

  check: #TODO: implement `blacksmith check`
    desc: "Check all datapacks in the world (stub — full blacksmith spec comes later)"
    cmds:
      - uv run blacksmith check {{.CLI_ARGS}}
