version: "3"

# Root Taskfile — the single source of truth for the buttons `town` shows.
# Each tool's tasks are pulled in under a namespace (guard:, scout:, …) and run
# from the repository root so they share the same config.yaml.

# Put every package's `src` on PYTHONPATH. This sidesteps a uv+CPython 3.13
# incompatibility on macOS: uv marks its editable `.pth` files with the
# UF_HIDDEN flag, and CPython 3.13's `site.py` skips hidden `.pth` files — so
# the workspace packages would otherwise not import. Tasks run from the repo
# root, so the relative paths resolve correctly.
env:
  PYTHONPATH: packages/filesystem/src:packages/minecraft/src:apps/guard/src:apps/scout/src:apps/blacksmith/src:apps/town/src

includes:
  guard:
    taskfile: ./apps/guard/Taskfile.yaml
    dir: .
  scout:
    taskfile: ./apps/scout/Taskfile.yaml
    dir: .
  blacksmith:
    taskfile: ./apps/blacksmith/Taskfile.yaml
    dir: .
  town:
    taskfile: ./apps/town/Taskfile.yaml
    dir: .
  carpenter:
    taskfile: ./apps/carpenter/Taskfile.yaml
    dir: .
  alchemist:
    taskfile: ./apps/alchemist/Taskfile.yaml
    dir: .

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list
    silent: true

  setup:
    desc: "Install the whole workspace with uv"
    cmds:
      - uv sync
      - task: _unhide-editables

  _unhide-editables:
    internal: true
    desc: "Un-hide uv's editable .pth files so plain `uv run`/IDEs can import too"
    cmds:
      - cmd: find .venv -name '_editable_impl_*.pth' -exec chflags nohidden {} + 2>/dev/null || true
        platforms: [darwin]

  test:
    desc: "Run the test suite"
    cmds:
      - uv run pytest {{.CLI_ARGS}}

  build:
    desc: "Build all packages"
    cmds:
      - uv build --all-packages

  clean:
    desc: "Remove build artefacts and caches"
    cmds:
      - rm -rf dist build .pytest_cache
      - find . -type d -name __pycache__ -prune -exec rm -rf {} +
