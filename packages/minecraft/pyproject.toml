[project]
name = "minecraft"
version = "2026.1.0"
description = "The Minecraft NBT and world for GrimmCraft Town"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "filesystem>=2026.1.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/minecraft"]
